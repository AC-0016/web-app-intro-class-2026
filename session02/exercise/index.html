    <!-- ============================================
         実習2: 基本的なHTMLページ
         まずは以下のh1とpを自分の内容に書き換えてみよう
    ============================================ -->
    <header>
        <h1>はじめてのWebページ</h1>
        <p>HTMLの勉強を始めました！</p>
    </header>

    <main>
        <section>
            <h1>田中太郎の自己紹介</h1>
            <p>理工学部の3年生です。</p>
        </section>

        <h2>趣味</h2>
        <section>
            <ul>
                <li>読書</li>
                <li>釣り</li>
                <li>天体観測</li>
            </ul>

        <h2>おすすめのサイト</h2>
            <a href="https://www.youtube.com/">YouTube</a>
        </section>

    </main>

<br>
